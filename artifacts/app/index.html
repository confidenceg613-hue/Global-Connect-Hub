<!DOCTYPE html>
<html lang="en" class="dark" style="background:#09090b;color-scheme:dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <title>PhoneLink — Secure Location Sharing</title>
    <meta name="description" content="Share your live location securely with trusted contacts. No account needed to grant access." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / WhatsApp link preview -->
    <meta property="og:title" content="PhoneLink — Secure Location Sharing" />
    <meta property="og:description" content="Tap to grant secure location access. No account required." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PhoneLink — Secure Location Sharing" />
    <meta name="twitter:description" content="Tap to grant secure location access. No account required." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Preload critical font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Inline critical CSS: dark background before JS/CSS loads -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html,body{margin:0;padding:0;background:#09090b;color:#fafafa;font-family:Inter,system-ui,-apple-system,sans-serif;min-height:100dvh}
      #root{min-height:100dvh}
      #pre-react-loader{
        position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
        justify-content:center;background:#09090b;z-index:9999;gap:16px;
        transition:opacity .3s ease;
      }
      #pre-react-loader svg{animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      #pre-react-loader .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px;color:#fafafa}
      #pre-react-loader .hint{font-size:13px;color:#71717a}
    </style>
  </head>
  <body>
    <!-- Pre-React loader: visible until React mounts and removes it -->
    <div id="pre-react-loader" aria-hidden="true">
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        PhoneLink
      </div>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
      <span class="hint">Setting up secure connection…</span>
    </div>

    <noscript>
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#09090b;color:#fafafa;text-align:center;padding:24px;font-family:system-ui,sans-serif">
        <div>
          <div style="font-size:32px;margin-bottom:12px">🔒</div>
          <h2 style="margin:0 0 8px;font-size:18px">JavaScript Required</h2>
          <p style="margin:0;color:#71717a;font-size:14px">Please enable JavaScript to use PhoneLink secure location sharing.</p>
        </div>
      </div>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
